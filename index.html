<!doctype html>
<html lang="en">
  <head>
    <title>Akan-Name-Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- My logo -->
    <header>
      <h1>Akan Name Generator</h1>
      <p>Enter your birthdate and gender to find your Akan name.</p>
    </header>
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#akan-name">Akan-Name</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
    <!-- This is the Home section -->
    <section id="home">
      <h1>Home</h1>
      <p></p>
    </section>
    <!-- This is the Akan-name generator section -->
    <section id="akan-name">
      <form id="akanForm">
        <label>Day:</label>
        <input type="number" id="day" required />

        <label>Month:</label>
        <input type="number" id="month" required />

        <label>Year:</label>
        <input type="number" id="year" required />

        <label>Gender:</label>
        <select id="gender" required>
          <option value="">Select</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>

        <button type="submit">Get Akan Name</button>
      </form>

      <h2 id="result"></h2>
    </section>
    <!-- This is the about section -->
     <section id="about">
      <h1>About</h1>
      <p>

      </p>
     </section>
     <!-- This is the cotanct section -->
      <section id="contact">
        <h1>Contact</h1>

      </section>

    <script src="./script.js"></script>
  </body>
  <footer>© 2026 Johncarlos Mwenda. All rights reserved.</footer>
</html>
